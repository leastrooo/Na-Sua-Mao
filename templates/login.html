{% extends "base.html" %}
{% block title %}Entrar — Na Sua Mão{% endblock %}
{% block content %}

<div class="min-h-[70vh] flex items-center justify-center py-8">
  <div class="w-full max-w-[420px]">

    
    <div class="bg-white rounded-3xl shadow-soft border border-gray-100 p-8 sm:p-10">
      
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-primary-600 mb-2 tracking-tight">Na sua mão</h1>
      </div>

      {% if erro %}
      <div class="bg-red-50 text-red-600 rounded-2xl px-4 py-3 mb-6 text-sm font-medium flex items-center gap-3 border border-red-100">
        <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
        {{ erro }}
      </div>
      {% endif %}

      
      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">E-mail ou CPF</label>
          <input type="text" name="email" required autocomplete="email"
                 class="w-full bg-white border border-gray-200 rounded-2xl px-4 py-3.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all shadow-sm"
                 placeholder="Digite aqui...">
        </div>
        
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Senha</label>
          <div class="relative">
            <input type="password" name="senha" id="senha-input" required autocomplete="current-password"
                   class="w-full bg-white border border-gray-200 rounded-2xl px-4 py-3.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none pr-12 transition-all shadow-sm"
                   placeholder="Sua senha">
            <button type="button" onclick="toggleSenha('senha-input', this)"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors p-1 focus:outline-none">
              
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit"
                class="w-full bg-primary-600 hover:bg-primary-700 text-white py-3.5 rounded-2xl font-bold text-sm transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 mt-2">
          Entrar
        </button>
      </form>

      <div class="mt-8 text-center text-sm text-gray-500">
        Não tem conta?
        <a href="/cadastro" class="text-primary-600 hover:text-primary-700 font-bold ml-1 hover:underline transition-colors">Cadastre-se</a>
      </div>

    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
function toggleSenha(id, btn) {
  const el = document.getElementById(id);
  if (el.type === 'password') {
    el.type = 'text';
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>`;
  } else {
    el.type = 'password';
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>`;
  }
}
</script>
{% endblock %}
